<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🗑️ Delete PDF Pages | EasyUseHub</title>
<link rel="stylesheet" href="assets/style.css">
<script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
</head>
<body>

<div class="container">
<h2>🗑️ Delete PDF Pages</h2>

<div class="upload" onclick="document.getElementById('file').click()">📁 Click to upload PDF</div>
<input type="file" id="file" accept="application/pdf" hidden>

<input type="text" id="pages" placeholder="Enter pages (e.g. 2,4 or 1-3)">
<button onclick="deletePages()">Delete Pages</button>
<button id="download-btn">📥 Download PDF</button>

<p id="status">No file selected</p>

<div class="bottom-buttons">
<a href="https://easyusehub.blogspot.com/p/free-pdf-tools-easyusehub.html?m=1">📂 All PDF Tools</a>
<a href="https://easyusehub.blogspot.com/?m=1">🏠 Home</a>
</div>
</div>

<script>
let file = null;
let downloadUrl = '';

document.getElementById('file').addEventListener('change', e => {
    file = e.target.files[0];
    document.getElementById('status').textContent = file ? file.name : 'No file selected';
});

// Parse page input
function parsePages(input){
    let pages = new Set();

    input.split(',').forEach(part => {
        if(part.includes('-')){
            let [start, end] = part.split('-').map(Number);
            for(let i = start; i <= end; i++){
                pages.add(i - 1);
            }
        } else {
            pages.add(Number(part) - 1);
        }
    });

    return Array.from(pages);
}

async function deletePages(){
    if(!file){ alert('Upload PDF first'); return; }

    const input = document.getElementById('pages').value;
    if(!input){ alert('Enter pages to delete'); return; }

    // 🔥 Smart limit
    if(file.size > 30 * 1024 * 1024){
        alert('❌ File too large! Max 30MB');
        return;
    }

    if(file.size > 20 * 1024 * 1024){
        document.getElementById('status').textContent =
        "⚠️ Large file! Processing may take time...";
    } else {
        document.getElementById('status').textContent = "Processing...";
    }

    try {
        const arrayBuffer = await file.arrayBuffer();
        const pdfDoc = await PDFLib.PDFDocument.load(arrayBuffer);
        const totalPages = pdfDoc.getPageCount();

        const deleteList = parsePages(input);

        const newPdf = await PDFLib.PDFDocument.create();

        for(let i = 0; i < totalPages; i++){
            if(!deleteList.includes(i)){
                const [page] = await newPdf.copyPages(pdfDoc, [i]);
                newPdf.addPage(page);
            }
        }

        const pdfBytes = await newPdf.save();
        const blob = new Blob([pdfBytes], {type:'application/pdf'});
        downloadUrl = URL.createObjectURL(blob);

        const btn = document.getElementById('download-btn');
        btn.style.display = 'block';
        btn.onclick = () => {
            const a = document.createElement('a');
            a.href = downloadUrl;
            a.download = 'edited.pdf';
            a.click();
        };

        document.getElementById('status').textContent = "✔ Pages deleted! Download ready.";

    } catch(e){
        console.error(e);
        document.getElementById('status').textContent = "❌ Error processing PDF!";
    }
}
</script>

</body>
</html>
