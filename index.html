            <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🗑️ Delete PDF Pages | EasyUseHub</title>

<link rel="stylesheet" href="assets/style.css">

<script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>

</head>
<body>

<div class="container">

<h2>🗑️ Delete PDF Pages</h2>

<!-- Top Ad -->
<div class="ad-container">
  <p>Sponsored: <a href="https://easyusehub.blogspot.com" target="_blank">Check out our other PDF tools</a></p>
</div>

<div class="upload" onclick="document.getElementById('file').click()">📁 Upload PDF</div>
<input type="file" id="file" accept="application/pdf" hidden>

<div style="display:flex; gap:10px; margin-top:10px;">
  <button onclick="selectAll()">✅ Select All</button>
  <button onclick="deselectAll()">❌ Deselect All</button>
</div>

<div id="pages-container" class="pages-grid"></div>

<button onclick="deletePages()">Delete Selected Pages</button>
<button id="download-btn">📥 Download PDF</button>

<p id="status">No file selected</p>

<div class="bottom-buttons">
<a href="#">📂 All PDF Tools</a>
<a href="#">🏠 Home</a>
</div>

<!-- Bottom Ad -->
<div class="ad-container">
  <p>Sponsored: <a href="https://easyusehub.blogspot.com" target="_blank">Try our free PDF watermark tool</a></p>
</div>

</div>

<script>
let file=null, pdfDocLib=null, pdfJsDoc=null;
let selectedPages = new Set();
let draggedItem = null;
let downloadUrl = '';

pdfjsLib.GlobalWorkerOptions.workerSrc =
'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

// PDF upload & render pages
document.getElementById('file').addEventListener('change', async (e)=>{
    file = e.target.files[0];
    if(!file) return;
    if(file.size > 30*1024*1024){ alert('❌ Max 30MB allowed'); return; }
    document.getElementById('status').textContent = file.size>20*1024*1024 ? "⚠️ Large file! Processing..." : "Loading PDF...";

    const buffer = await file.arrayBuffer();
    pdfDocLib = await PDFLib.PDFDocument.load(buffer);
    pdfJsDoc = await pdfjsLib.getDocument({data: buffer}).promise;
    const totalPages = pdfJsDoc.numPages;

    const container = document.getElementById('pages-container');
    container.innerHTML = '';
    selectedPages.clear();

    for(let i=1;i<=totalPages;i++){
        const page = await pdfJsDoc.getPage(i);
        const viewport = page.getViewport({scale:0.5});
        const canvas = document.createElement('canvas');
        canvas.width = viewport.width;
        canvas.height = viewport.height;
        await page.render({canvasContext:canvas.getContext('2d'), viewport}).promise;

        const div = document.createElement('div');
        div.className = 'page-item';
        div.dataset.index = i-1;
        div.innerHTML = `<small>Page ${i}</small>`;
        div.appendChild(canvas);

        div.onclick = ()=> {
            const idx = Number(div.dataset.index);
            if(selectedPages.has(idx)){ selectedPages.delete(idx); div.classList.remove('selected'); }
            else{ selectedPages.add(idx); div.classList.add('selected'); }
        };

        container.appendChild(div);
    }

    enableDragAndDrop();
    document.getElementById('status').textContent = `✔ ${totalPages} pages loaded`;
});

// Select / Deselect All
function selectAll(){
    const items = document.querySelectorAll('.page-item');
    items.forEach((div,index)=>{
        selectedPages.add(index);
        div.classList.add('selected');
    });
}
function deselectAll(){
    const items = document.querySelectorAll('.page-item');
    items.forEach((div,index)=>{
        selectedPages.delete(index);
        div.classList.remove('selected');
    });
}

// Drag & Drop
function enableDragAndDrop(){
    const items = document.querySelectorAll('.page-item');
    items.forEach(item=>{
        item.setAttribute('draggable',true);
        item.addEventListener('dragstart',()=>{ draggedItem=item; item.classList.add('dragging'); });
        item.addEventListener('dragend',()=>{ draggedItem=null; item.classList.remove('dragging'); });
        item.addEventListener('dragover', (e)=>{
            e.preventDefault();
            const container = document.getElementById('pages-container');
            const afterElement = getDragAfterElement(container,e.clientY);
            if(afterElement==null) container.appendChild(draggedItem);
            else container.insertBefore(draggedItem, afterElement);
        });
    });
}
function getDragAfterElement(container,y){
    const draggableElements = [...container.querySelectorAll('.page-item:not(.dragging)')];
    return draggableElements.reduce((closest,child)=>{
        const box = child.getBoundingClientRect();
        const offset = y - box.top - box.height/2;
        if(offset<0 && offset>closest.offset) return {offset:offset, element:child};
        else return closest;
    },{offset:Number.NEGATIVE_INFINITY}).element;
}

// Delete Selected + Reorder
async function deletePages(){
    if(!pdfDocLib){ alert('Upload PDF first'); return; }
    const newPdf = await PDFLib.PDFDocument.create();
    const items = document.querySelectorAll('.page-item');
    for(let i=0;i<items.length;i++){
        const originalIndex = Number(items[i].dataset.index);
        if(!selectedPages.has(originalIndex)){
            const [page] = await newPdf.copyPages(pdfDocLib,[originalIndex]);
            newPdf.addPage(page);
        }
    }
    const pdfBytes = await newPdf.save();
    const blob = new Blob([pdfBytes], {type:'application/pdf'});
    downloadUrl = URL.createObjectURL(blob);

    const btn = document.getElementById('download-btn');
    btn.style.display='block';
    btn.onclick=()=>{
        const a=document.createElement('a');
        a.href=downloadUrl;
        a.download='edited.pdf';
        a.click();
    };
    document.getElementById('status').textContent="✔ Pages deleted!";
}
</script>
</body>
</html>
